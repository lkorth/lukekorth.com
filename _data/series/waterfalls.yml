description: Dramatic waterfalls and long exposures.
statement: Waterfalls are a favorite subject of mine, they're interesting to find, are never the same,
  and provide a great picnic spot to take in the sight and sound. I've spent hours waiting for a frame
  with no people in it or battling snow, ice, and slot canyons to reach them.
where: rivers and streams
colophon_process: Shot on a tripod anywhere from a high f-stop to a 10 stop neutral density filter.
  Elevation and framing make or break the photo.
colophon_prints: Prints available on request, these look great large and dramatic.
